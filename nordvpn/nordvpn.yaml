apiVersion: apps/v1
kind: Deployment
metadata:
  name: nordvpn
  namespace: default
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: nordvpn
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: nordvpn
        part-of: nordvpn
    spec:
      volumes:
        - name: prowlarr-pvc
          persistentVolumeClaim:
            claimName: prowlarr-pvc
        - name: qbittorrent-pvc
          persistentVolumeClaim:
            claimName: qbittorrent-pvc
        - name: nasio-nfs-pvc
          persistentVolumeClaim:
            claimName: nasio-nfs-pvc
        - name: prowlarr-logs-dir
          emptyDir:
            medium: Memory
        - name: qbittorrent-logs-dir
          emptyDir:
            medium: Memory
      containers:
        - image: nucio.nowhere:30038/nordvpn:latest
          imagePullPolicy: Always
          name: nordvpn
          lifecycle:
            postStart:
              exec:
                command:
                  ["/bin/sh", "-c", "/wait_for_nordvpn.sh > /usr/share/message"]
          env:
            - name: NORDVPN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nordvpn-token
                  key: password
            - name: COUNTRY
              value: "P2P"
            - name: NETWORK
              value: "192.168.2.0/24;10.42.0.0/16;10.43.0.0/16"
            - name: PORTS
              value: "8112,6881,9696,8080,53"
            - name: DNS
              value: "10.43.0.10"
          startupProbe:
            exec:
              command:
                - /check_nordvpn_connection.sh
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - /check_nordvpn_connection.sh
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - /check_nordvpn_connection.sh
            initialDelaySeconds: 30
            periodSeconds: 300
            timeoutSeconds: 5
            failureThreshold: 5
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
          resources:
            limits:
              cpu: 1000m
              memory: 2000Mi
            requests:
              cpu: 100m
              memory: 500Mi
        - image: linuxserver/prowlarr:latest
          imagePullPolicy: Always
          name: prowlarr
          volumeMounts:
            - mountPath: "/config"
              name: prowlarr-pvc
            - mountPath: "/config/logs"
              name: prowlarr-logs-dir
          env:
            - name: PUID
              value: "1026"
            - name: PGID
              value: "100"
            - name: TZ
              value: "EU/Dublin"
          startupProbe:
            httpGet:
              path: /system/status/
              port: 9696
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /system/status/
              port: 9696
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /system/status/
              port: 9696
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            limits:
              cpu: 200m
              memory: 250Mi
            requests:
              cpu: 50m
              memory: 50Mi
        - image: linuxserver/qbittorrent:latest
          imagePullPolicy: Always
          name: qbittorrent
          ports:
            - containerPort: 8112
              protocol: TCP
            - containerPort: 6881
              protocol: TCP
            - containerPort: 6881
              protocol: UDP
          volumeMounts:
            - mountPath: "/config"
              name: qbittorrent-pvc
            - mountPath: "/config/qBittorrent/logs"
              name: qbittorrent-logs-dir
            - mountPath: "/volume1/public/Kubernetes/QBittorrent"
              subPath: "Kubernetes/QBittorrent"
              name: nasio-nfs-pvc
          startupProbe:
            httpGet:
              path: /
              port: 8112
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8112
            initialDelaySeconds: 30
            periodSeconds: 120
            timeoutSeconds: 30
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8112
            initialDelaySeconds: 30
            periodSeconds: 120
            timeoutSeconds: 30
            failureThreshold: 5
          env:
            - name: PUID
              value: "1026"
            - name: PGID
              value: "100"
            - name: TZ
              value: "EU/Dublin"
            - name: WEBUI_PORT
              value: "8112"
          resources:
            limits:
              cpu: 1000m
              memory: 3000Mi
            requests:
              cpu: 100m
              memory: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nordvpn
  namespace: default
spec:
  clusterIP: None
  ports:
    - port: 4789
      name: nordvpn-http
      protocol: UDP
  selector:
    app: nordvpn
  type: ClusterIP
---
# Prowlarr
apiVersion: v1
kind: Service
metadata:
  name: prowlarr
  namespace: default
spec:
  selector:
    app: nordvpn
  ports:
    - port: 9696
      targetPort: 9696
      name: prowlarr-web
  type: ClusterIP
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prowlarr-tls
  namespace: default
spec:
  secretName: prowlarr-tls
  issuerRef:
    name: blinky-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - prowlarr.nowhere
  privateKey:
    rotationPolicy: Always
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prowlarr
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    external-dns.alpha.kubernetes.io/hostname: prowlarr.nowhere
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - prowlarr.nowhere
      secretName: prowlarr-tls
  rules:
    - host: prowlarr.nowhere
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prowlarr
                port:
                  number: 9696
---
# qBittorrent
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: default
spec:
  selector:
    app: nordvpn
  ports:
    - port: 8112
      targetPort: 8112
      name: qbittorrent-web
  type: ClusterIP
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: qbittorrent-tls
  namespace: default
spec:
  secretName: qbittorrent-tls
  issuerRef:
    name: blinky-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - qbittorrent.nowhere
  privateKey:
    rotationPolicy: Always
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qbittorrent
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    external-dns.alpha.kubernetes.io/hostname: qbittorrent.nowhere
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - qbittorrent.nowhere
      secretName: qbittorrent-tls
  rules:
    - host: qbittorrent.nowhere
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qbittorrent
                port:
                  number: 8112
