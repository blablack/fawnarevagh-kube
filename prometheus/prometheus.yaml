apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  image: quay.io/prometheus/prometheus:latest
  imagePullPolicy: Always
  nodeSelector:
    kubernetes.io/os: linux
  replicas: 2
  resources:
    limits:
      memory: "600Mi"
      cpu: "200m"
    requests:
      memory: "400Mi"
      cpu: "100m"
  securityContext:
    fsGroup: 2000
    runAsNonRoot: true
    runAsUser: 1000
  serviceAccountName: prometheus
  serviceMonitorSelector:
    matchExpressions:
      - key: name
        operator: In
        values:
          - node-exporter
          - longhorn-prometheus-servicemonitor
          - kubelet
          - snmp-exporter
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app: prometheus
            topologyKey: kubernetes.io/hostname
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: my-longhorn
        resources:
          requests:
            storage: 10Gi
  retention: "15d"
  retentionSize: "9500MiB"
  walCompression: true
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  type: ClusterIP
  ports:
    - name: web
      port: 9090
      targetPort: web
  selector:
    prometheus: prometheus
  sessionAffinity: ClientIP
