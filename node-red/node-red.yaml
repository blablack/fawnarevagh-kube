apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-red
  namespace: default
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: node-red
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: node-red
    spec:
      volumes:
        - name: node-red-pvc
          persistentVolumeClaim:
            claimName: node-red-pvc
      containers:
        - image: nodered/node-red:latest
          imagePullPolicy: Always
          name: node-red
          volumeMounts:
            - mountPath: "/data"
              name: node-red-pvc
          env:
            - name: NODE_RED_ENABLE_PROJECTS
              value: "true"
            - name: TZ
              value: "Europe/Dublin"
          startupProbe:
            httpGet:
              path: /
              port: 1880
            initialDelaySeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 1880
            initialDelaySeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 1880
            initialDelaySeconds: 10
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 10m
              memory: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: node-red
  namespace: default
spec:
  selector:
    app: node-red
  ports:
    - port: 80
      targetPort: 1880
      protocol: TCP
  type: ClusterIP
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: node-red-tls
  namespace: default
spec:
  secretName: node-red-tls
  issuerRef:
    name: blinky-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - node-red.nowhere
  privateKey:
    rotationPolicy: Always
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: node-red
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    external-dns.alpha.kubernetes.io/hostname: node-red.nowhere
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - node-red.nowhere
      secretName: node-red-tls
  rules:
    - host: node-red.nowhere
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: node-red
                port:
                  number: 80
