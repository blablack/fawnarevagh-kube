apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: default
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: ollama
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ollama
    spec:
      nodeSelector:
        kubernetes.io/hostname: quario
      volumes:
        - name: ollama-pvc
          persistentVolumeClaim:
            claimName: ollama-pvc
        - name: nasio-nfs-pvc
          persistentVolumeClaim:
            claimName: nasio-nfs-pvc
        - name: dev-dri
          hostPath:
            path: /dev/dri
            type: Directory
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 11434
              name: http
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_MODELS
              value: "/models"
            - name: TZ
              value: "Europe/Dublin"
          volumeMounts:
            - mountPath: /root/.ollama
              name: ollama-pvc
            - mountPath: /models
              subPath: "Kubernetes/Ollama/ollama"
              name: nasio-nfs-pvc
            - mountPath: /dev/dri
              name: dev-dri
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
              gpu.intel.com/i915: "1"
            limits:
              cpu: 6000m
              memory: 16Gi
              gpu.intel.com/i915: "1"
          startupProbe:
            httpGet:
              path: /api/version
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/version
              port: 11434
            initialDelaySeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/version
              port: 11434
            initialDelaySeconds: 30
            timeoutSeconds: 10
---
# ── Ollama Service
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: default
spec:
  selector:
    app: ollama
  ports:
    - port: 80
      targetPort: 11434
      protocol: TCP
  type: ClusterIP
---
# ── Ollama Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ollama-tls
  namespace: default
spec:
  secretName: ollama-tls
  issuerRef:
    name: blinky-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - ollama.nowhere
  privateKey:
    rotationPolicy: Always
---
# ── Ollama Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ollama
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    external-dns.alpha.kubernetes.io/hostname: ollama.nowhere
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ollama.nowhere
      secretName: ollama-tls
  rules:
    - host: ollama.nowhere
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ollama
                port:
                  number: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: default
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: open-webui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      nodeSelector:
        kubernetes.io/hostname: quario
      volumes:
        - name: open-webui-pvc
          persistentVolumeClaim:
            claimName: open-webui-pvc
        - name: nasio-nfs-pvc
          persistentVolumeClaim:
            claimName: nasio-nfs-pvc
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama.default.svc.cluster.local"
            - name: TZ
              value: "Europe/Dublin"
            - name: OAUTH_CLIENT_ID
              value: "9fcAOmFklCC2I9040fnSlBnhup4Z1UfCPOjydqkm"
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: open-webui
                  key: authentik
            - name: OAUTH_PROVIDER_NAME
              value: authentik
            - name: OPENID_PROVIDER_URL
              value: https://authentik.nowhere/application/o/open-web-ui/.well-known/openid-configuration
            - name: OPENID_REDIRECT_URI
              value: https://ai.nowhere/oauth/oidc/callback
            - name: WEBUI_URL
              value: https://ai.nowhere
            - name: ENABLE_OAUTH_SIGNUP
              value: "true
            - name: ENABLE_LOGIN_FORM
              value: "false"
            - name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL
              value: "true"
          volumeMounts:
            - mountPath: /app/backend/data
              name: open-webui-pvc
            - mountPath: /app/backend/data/cache
              subPath: "Kubernetes/Ollama/open-webui"
              name: nasio-nfs-pvc
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            timeoutSeconds: 10
---
# ── Open WebUI Service
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: default
spec:
  selector:
    app: open-webui
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
# ── Open WebUI Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: open-webui-tls
  namespace: default
spec:
  secretName: open-webui-tls
  issuerRef:
    name: blinky-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - ai.nowhere
  privateKey:
    rotationPolicy: Always
---
# ── Open WebUI Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-webui
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    external-dns.alpha.kubernetes.io/hostname: ai.nowhere
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ai.nowhere
      secretName: open-webui-tls
  rules:
    - host: ai.nowhere
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 80
