apiVersion: v1
kind: Service
metadata:
  name: authentik-old
  namespace: default
  annotations:
    metallb.io/address-pool: default
    metallb.io/loadBalancerIPs: 192.168.2.221
spec:
  externalTrafficPolicy: Local
  selector:
    app: authentik
  ports:
    - name: http
      protocol: TCP
      port: 9000
      targetPort: 9000
  type: LoadBalancer