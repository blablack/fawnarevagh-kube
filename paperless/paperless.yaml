apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless
  namespace: default
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: paperless
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: paperless
        part-of: paperless
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: "part-of"
                    operator: In
                    values:
                      - paperless
              topologyKey: "kubernetes.io/hostname"
      volumes:
        - name: paperless-pvc
          persistentVolumeClaim:
            claimName: paperless-pvc
        - name: blinky-ca
          secret:
            secretName: blinky-root-ca-secret
            items:
              - key: ca.crt
                path: ca.crt
      # https://github.com/paperless-ngx/paperless-ngx/blob/main/docker/compose/docker-compose.postgres.yml
      terminationGracePeriodSeconds: 60
      containers:
        - image: docker.io/library/postgres:16
          imagePullPolicy: Always
          name: postgres
          env:
            - name: POSTGRES_USER
              value: "paperless"
            - name: POSTGRES_PASSWORD
              value: "paperless"
            - name: POSTGRES_DB
              value: "paperless"
            - name: POSTGRES_INITDB_ARGS
              value: "--data-checksums"
          volumeMounts:
            - mountPath: "/var/lib/postgresql/data"
              subPath: "postgresql"
              name: paperless-pvc
          startupProbe:
            exec:
              command:
                - pg_isready
                - -U
                - paperless
                - -d
                - paperless
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - paperless
                - -d
                - paperless
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    su - postgres -c "pg_ctl stop -D /var/lib/postgresql/data/pgdata -m fast -t 30"
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 10m
              memory: 50Mi
        - image: redis:latest
          imagePullPolicy: Always
          name: redis
          volumeMounts:
            - mountPath: "/data"
              subPath: "redis"
              name: paperless-pvc
          resources:
            limits:
              cpu: 100m
              memory: 400Mi
            requests:
              cpu: 40m
              memory: 50Mi
        - image: paperlessngx/paperless-ngx:latest
          imagePullPolicy: Always
          name: paperless
          volumeMounts:
            - mountPath: /usr/src/paperless/data
              subPath: "paperless/data"
              name: paperless-pvc
            - mountPath: /usr/src/paperless/media
              subPath: "paperless/media"
              name: paperless-pvc
            - mountPath: /usr/src/paperless/export
              subPath: "paperless/export"
              name: paperless-pvc
            - mountPath: /usr/src/paperless/consume
              subPath: "paperless/consume"
              name: paperless-pvc
            - mountPath: /certs
              name: blinky-ca
              readOnly: true
          ports:
            - containerPort: 8000
              name: paperless-tcp
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 180
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          env:
            - name: PAPERLESS_REDIS
              value: "redis://localhost:6379"
            - name: PAPERLESS_DBHOST
              value: "localhost"
            - name: USERMAP_UID
              value: "1000"
            - name: USERMAP_GID
              value: "1000"
            - name: PAPERLESS_URL
              value: https://paperless.nowhere
            - name: PAPERLESS_PORT
              value: "8000"
            - name: PAPERLESS_ADMIN_USER
              value: "blablack"
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: paperless-password
            - name: PAPERLESS_APPS
              value: allauth.socialaccount.providers.openid_connect
            - name: PAPERLESS_ACCOUNT_DEFAULT_HTTP_PROTOCOL
              value: "https"
            - name: PAPERLESS_SOCIALACCOUNT_PROVIDERS
              valueFrom:
                secretKeyRef:
                  key: authentik
                  name: paperless-password
            - name: REQUESTS_CA_BUNDLE
              value: /certs/ca.crt
            - name: SSL_CERT_FILE
              value: /certs/ca.crt
          resources:
            limits:
              cpu: 1000m
              memory: 2000Mi
            requests:
              cpu: 20m
              memory: 200Mi
---
apiVersion: v1
kind: Service
metadata:
  name: paperless
  namespace: default
spec:
  selector:
    app: paperless
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: paperless-tls
  namespace: default
spec:
  secretName: paperless-tls
  issuerRef:
    name: blinky-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - paperless.nowhere
  privateKey:
    rotationPolicy: Always
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: paperless
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    external-dns.alpha.kubernetes.io/hostname: paperless.nowhere
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - paperless.nowhere
      secretName: paperless-tls
  rules:
    - host: paperless.nowhere
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: paperless
                port:
                  number: 80
