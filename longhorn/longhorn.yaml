---
apiVersion: v1
kind: Service
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  selector:
    app: longhorn-ui
  ports:
    - name: http-80
      protocol: TCP
      port: 80
      targetPort: http
  type: ClusterIP
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: longhorn-tls
  namespace: longhorn-system
spec:
  secretName: longhorn-tls
  issuerRef:
    name: blinky-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - longhorn.nowhere
  privateKey:
    rotationPolicy: Always
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longhorn
  namespace: longhorn-system
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    external-dns.alpha.kubernetes.io/hostname: longhorn.nowhere
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - longhorn.nowhere
      secretName: longhorn-tls
  rules:
    - host: longhorn.nowhere
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: longhorn
                port:
                  number: 80