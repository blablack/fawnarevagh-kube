apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdarr
  namespace: default
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: tdarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: tdarr
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - tdarr-node
              topologyKey: "kubernetes.io/hostname"
      volumes:
        - name: tdarr-pvc
          persistentVolumeClaim:
            claimName: tdarr-pvc
        - name: nasio-nfs-pvc
          persistentVolumeClaim:
            claimName: nasio-nfs-pvc
      containers:
        - image: haveagitgat/tdarr:latest
          imagePullPolicy: Always
          name: tdarr
          volumeMounts:
            - mountPath: "/app/server"
              subPath: "server"
              name: tdarr-pvc
            - mountPath: "/app/configs"
              subPath: "configs"
              name: tdarr-pvc
            - mountPath: "/app/logs"
              subPath: "logs"
              name: tdarr-pvc
            - mountPath: "/dovi-tools"
              subPath: "dovi-tools"
              name: tdarr-pvc
            - mountPath: "/data"
              name: nasio-nfs-pvc
          env:
            - name: PUID
              value: "1026"
            - name: PGID
              value: "100"
            - name: TZ
              value: "EU/Dublin"
            - name: serverIP
              value: "0.0.0.0"
            - name: serverPort
              value: "8266"
            - name: webUIPort
              value: "8265"
            - name: internalNode
              value: "true"
            - name: inContainer
              value: "true"
            - name: nodeName
              value: "MainNode"
            - name: ffmpegVersion
              value: "6"
            - name: PATH
              value: "/dovi-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          startupProbe:
            httpGet:
              path: /
              port: 8265
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8265
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8265
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            limits:
              cpu: 2000m
              memory: 8Gi
              gpu.intel.com/i915: 1000m
            requests:
              cpu: 50m
              memory: 100Mi
              gpu.intel.com/i915: 1000m
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdarr-node
  namespace: default
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: tdarr-node
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: tdarr-node
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - tdarr
              topologyKey: "kubernetes.io/hostname"
      volumes:
        - name: tdarr-node-pvc
          persistentVolumeClaim:
            claimName: tdarr-node-pvc
        - name: nasio-nfs-pvc
          persistentVolumeClaim:
            claimName: nasio-nfs-pvc
      containers:
        - image: haveagitgat/tdarr_node:latest
          imagePullPolicy: Always
          name: tdarr-node
          volumeMounts:
            - mountPath: "/app/configs"
              subPath: "configs"
              name: tdarr-node-pvc
            - mountPath: "/app/logs"
              subPath: "logs"
              name: tdarr-node-pvc
            - mountPath: "/dovi-tools"
              subPath: "dovi-tools"
              name: tdarr-node-pvc
            - mountPath: "/data"
              name: nasio-nfs-pvc
          env:
            - name: PUID
              value: "1026"
            - name: PGID
              value: "100"
            - name: TZ
              value: "EU/Dublin"
            - name: serverIP
              value: "tdarr"
            - name: serverPort
              value: "8266"
            - name: inContainer
              value: "true"
            - name: nodeName
              value: "SecondNode"
            - name: ffmpegVersion
              value: "6"
            - name: PATH
              value: "/dovi-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          resources:
            limits:
              cpu: 2000m
              memory: 8Gi
              gpu.intel.com/i915: 1000m
            requests:
              cpu: 50m
              memory: 100Mi
              gpu.intel.com/i915: 1000m
---
apiVersion: v1
kind: Service
metadata:
  name: tdarr
  namespace: default
spec:
  selector:
    app: tdarr
  ports:
    - port: 80
      targetPort: 8265
      name: web
    - port: 8266
      targetPort: 8266
      name: server
  type: ClusterIP
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tdarr-tls
  namespace: default
spec:
  secretName: tdarr-tls
  issuerRef:
    name: blinky-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - tdarr.nowhere
  privateKey:
    rotationPolicy: Always
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tdarr
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    external-dns.alpha.kubernetes.io/hostname: tdarr.nowhere
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - tdarr.nowhere
      secretName: tdarr-tls
  rules:
    - host: tdarr.nowhere
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tdarr
                port:
                  number: 80
